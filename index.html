<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evan — Software Engineer & AI Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    <style>
      :root {
        --bg: #0A0A0A;
        --surface: #111111;
        --neon: #6FFF00;
        --text: #EDEDED;
        --muted: #888888;
        --faint: #1A1A1A;
        --hairline: #1E1E1E;
      }

      * { box-sizing: border-box; }

      html {
        scroll-behavior: smooth;
        background: var(--bg);
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 14px;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        cursor: none;
      }

      a, button { cursor: none; }

      ::selection {
        background: var(--neon);
        color: var(--bg);
      }

      /* ---------- Custom cursor ---------- */
      .cursor-dot {
        position: fixed;
        top: 0;
        left: 0;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--neon);
        pointer-events: none;
        z-index: 100;
        mix-blend-mode: difference;
        transform: translate(-50%, -50%);
        transition: width 120ms ease, height 120ms ease;
      }
      .cursor-dot.is-hover {
        width: 18px;
        height: 18px;
      }

      /* ---------- Grain overlay ---------- */
      .grain {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      /* ---------- Layout ---------- */
      .shell {
        max-width: 680px;
        margin: 0 auto;
        padding: 32px 28px 0;
      }

      /* ---------- Page-load animation ---------- */
      .reveal {
        opacity: 0;
        transform: translateY(16px);
        animation: rise 700ms cubic-bezier(0.2, 0.7, 0.1, 1) forwards;
      }
      @keyframes rise {
        to { opacity: 1; transform: translateY(0); }
      }

      /* ---------- Top row ---------- */
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--muted);
      }
      .breadcrumb {
        letter-spacing: 0.02em;
      }
      .icon-row {
        display: flex;
        gap: 18px;
      }
      .icon-link {
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        transition: color 200ms ease, transform 200ms ease;
      }
      .icon-link:hover {
        color: var(--neon);
        transform: translateY(-1px);
      }

      /* ---------- Hero ---------- */
      .hero {
        margin-top: 96px;
        margin-bottom: 80px;
      }
      .hero-name {
        font-family: "DM Serif Display", serif;
        font-weight: 400;
        font-size: clamp(52px, 8.4vw, 72px);
        line-height: 1.02;
        letter-spacing: -0.01em;
        color: var(--text);
        margin: 0;
      }
      .hero-name .em {
        color: var(--muted);
        font-style: italic;
        font-weight: 400;
      }
      .blink {
        display: inline-block;
        color: var(--neon);
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      .hero-meta {
        margin-top: 18px;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.02em;
      }
      .hero-meta .dot {
        display: inline-block;
        width: 4px;
        height: 4px;
        background: var(--muted);
        border-radius: 50%;
        margin: 0 10px 2px;
        vertical-align: middle;
      }
      .hero-blurb {
        margin-top: 26px;
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
        max-width: 480px;
      }
      .hero-blurb .accent {
        color: var(--neon);
      }

      .pill-row {
        margin-top: 32px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .pill {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        padding: 10px 20px;
        border-radius: 999px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 200ms ease, color 200ms ease,
                    border-color 200ms ease, opacity 200ms ease,
                    transform 200ms ease;
        border: 1px solid transparent;
      }
      .pill-primary {
        background: var(--neon);
        color: var(--bg);
        font-weight: 500;
      }
      .pill-primary:hover { opacity: 0.9; transform: translateY(-1px); }
      .pill-ghost {
        border: 1px solid #2A2A2A;
        color: var(--text);
        background: transparent;
      }
      .pill-ghost:hover {
        border-color: var(--neon);
        color: var(--text);
        transform: translateY(-1px);
      }

      /* ---------- Section ---------- */
      .section {
        padding-top: 56px;
        padding-bottom: 16px;
      }
      .section-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--faint);
      }

      /* ---------- Project rows ---------- */
      .row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        padding: 24px 0;
        border-bottom: 1px solid var(--faint);
        position: relative;
        text-decoration: none;
        color: inherit;
        transition: padding-left 220ms ease, background 220ms ease;
      }
      .row::before {
        content: "";
        position: absolute;
        left: -12px;
        top: 24px;
        bottom: 24px;
        width: 2px;
        background: var(--neon);
        opacity: 0;
        transition: opacity 220ms ease;
      }
      .row:hover {
        padding-left: 12px;
      }
      .row:hover::before { opacity: 1; }

      .row-main { min-width: 0; flex: 1; }
      .row-title {
        font-family: "DM Serif Display", serif;
        font-size: 20px;
        color: var(--text);
        margin: 0 0 6px;
        letter-spacing: -0.005em;
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
      }
      .row-arrow {
        font-family: "JetBrains Mono", monospace;
        color: var(--neon);
        font-size: 14px;
        opacity: 0;
        transform: translateX(-4px);
        transition: opacity 220ms ease, transform 220ms ease;
      }
      .row:hover .row-arrow {
        opacity: 1;
        transform: translateX(0);
      }
      .row-desc {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.7;
        max-width: 480px;
      }
      .row-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--neon);
        line-height: 1.7;
        margin-top: 8px;
        letter-spacing: 0.01em;
      }
      .row-side {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        padding: 5px 11px;
        border-radius: 999px;
        border: 1px solid;
        white-space: nowrap;
      }
      .status-live {
        background: rgba(111, 255, 0, 0.08);
        color: var(--neon);
        border-color: rgba(111, 255, 0, 0.22);
      }
      .status-hack {
        background: rgba(68, 68, 68, 0.12);
        color: #888;
        border-color: rgba(68, 68, 68, 0.5);
      }

      /* ---------- Stack ---------- */
      .stack-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px 40px;
      }
      @media (max-width: 768px) {
        .stack-grid { grid-template-columns: 1fr; }
        .hero { margin-top: 64px; margin-bottom: 56px; }
      }
      .skill {
        display: flex;
        justify-content: space-between;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        padding: 8px 0;
        border-bottom: 1px dashed transparent;
        transition: border-color 200ms ease, color 200ms ease;
      }
      .skill:hover {
        border-bottom-color: var(--faint);
      }
      .skill-name { color: var(--text); }
      .skill-tag { color: var(--muted); }

      .study-line {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 1px solid var(--faint);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.8;
      }
      .study-line .em { color: #9a9a9a; }

      /* ---------- Story (timeline) ---------- */
      .story-row {
        display: flex;
        gap: 32px;
        padding: 22px 0;
        border-bottom: 1px solid var(--faint);
        align-items: flex-start;
        position: relative;
      }
      .story-age {
        font-family: "DM Serif Display", serif;
        font-size: 32px;
        color: var(--hairline);
        width: 64px;
        flex-shrink: 0;
        line-height: 1;
        padding-top: 2px;
        transition: color 260ms ease, transform 260ms ease;
      }
      .story-row:hover .story-age {
        color: var(--neon);
        transform: translateX(2px);
      }
      .story-body { min-width: 0; }
      .story-head {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 10px;
        font-weight: 500;
      }
      .story-text {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.85;
      }

      /* ---------- Now ---------- */
      .now-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        padding: 10px 0;
        font-family: "JetBrains Mono", monospace;
      }
      .now-row .left { color: var(--text); font-size: 13px; }
      .now-row .right { color: var(--muted); font-size: 11px; letter-spacing: 0.06em; }
      .now-bullet {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--neon);
        border-radius: 50%;
        margin-right: 12px;
        vertical-align: middle;
        position: relative;
        top: -2px;
      }
      .now-bullet.idle { background: var(--muted); }

      /* ---------- Contact / footer ---------- */
      .contact { margin-top: 96px; padding-bottom: 64px; }
      .contact-h {
        font-family: "DM Serif Display", serif;
        font-size: 32px;
        color: var(--text);
        margin: 0;
        letter-spacing: -0.01em;
      }
      .contact-p {
        margin-top: 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.7;
        max-width: 460px;
      }
      .contact-links {
        margin-top: 32px;
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }
      .contact-link {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        transition: color 200ms ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .contact-link:hover { color: var(--neon); }

      .footer-bar {
        margin-top: 64px;
        padding-top: 24px;
        border-top: 1px solid var(--faint);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #333;
        letter-spacing: 0.04em;
      }
      .footer-bar .ping {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .ping-dot {
        width: 6px;
        height: 6px;
        background: var(--neon);
        border-radius: 50%;
        box-shadow: 0 0 0 0 rgba(111, 255, 0, 0.6);
        animation: ping 2.4s ease-out infinite;
      }
      @keyframes ping {
        0% { box-shadow: 0 0 0 0 rgba(111, 255, 0, 0.45); }
        80%, 100% { box-shadow: 0 0 0 8px rgba(111, 255, 0, 0); }
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div id="cursor" class="cursor-dot" aria-hidden="true"></div>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useEffect, useRef, useState } = React;

      // ---------- Tiny inline icons (lucide-style stroke) ----------
      const stroke = {
        fill: "none",
        stroke: "currentColor",
        strokeWidth: 1.6,
        strokeLinecap: "round",
        strokeLinejoin: "round",
      };
      const Icon = {
        Github: (p) => (
          <svg viewBox="0 0 24 24" width="16" height="16" {...stroke} {...p}>
            <path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5a3 3 0 0 0-.9-2.4c2.97-.33 6.1-1.5 6.1-6.5A4.7 4.7 0 0 0 19 4.77 4.4 4.4 0 0 0 18.92 1S17.73.65 15 2.48a13.4 13.4 0 0 0-7 0C5.27.65 4.07 1 4.07 1A4.4 4.4 0 0 0 4 4.77 4.7 4.7 0 0 0 2.8 8.6c0 5 3.13 6.13 6.1 6.5A3 3 0 0 0 8 17.5V21" />
          </svg>
        ),
        Twitter: (p) => (
          <svg viewBox="0 0 24 24" width="16" height="16" {...stroke} {...p}>
            <path d="M3 3l7.5 10L3.5 21H6l5.7-6.4L16 21h5l-7.9-10.6L20.4 3H18l-5.2 5.8L8.5 3H3z" />
          </svg>
        ),
        Mail: (p) => (
          <svg viewBox="0 0 24 24" width="16" height="16" {...stroke} {...p}>
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="M3 7l9 6 9-6" />
          </svg>
        ),
        Arrow: (p) => (
          <svg viewBox="0 0 24 24" width="12" height="12" {...stroke} {...p}>
            <path d="M7 17L17 7" />
            <path d="M8 7h9v9" />
          </svg>
        ),
      };

      // ---------- Custom cursor ----------
      function useCursor() {
        useEffect(() => {
          const dot = document.getElementById("cursor");
          if (!dot) return;
          let raf = null;
          let tx = window.innerWidth / 2, ty = window.innerHeight / 2;
          let cx = tx, cy = ty;
          const onMove = (e) => {
            tx = e.clientX; ty = e.clientY;
            if (!raf) raf = requestAnimationFrame(tick);
          };
          const tick = () => {
            cx += (tx - cx) * 0.35;
            cy += (ty - cy) * 0.35;
            dot.style.transform = `translate(${cx}px, ${cy}px) translate(-50%, -50%)`;
            if (Math.abs(tx - cx) > 0.3 || Math.abs(ty - cy) > 0.3) {
              raf = requestAnimationFrame(tick);
            } else {
              raf = null;
            }
          };
          const onOver = (e) => {
            const t = e.target;
            if (t && t.closest && t.closest("a, button, .row, .skill, .story-row")) {
              dot.classList.add("is-hover");
            }
          };
          const onOut = () => dot.classList.remove("is-hover");
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseover", onOver);
          window.addEventListener("mouseout", onOut);
          return () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseover", onOver);
            window.removeEventListener("mouseout", onOut);
          };
        }, []);
      }

      // ---------- Reveal animation helper ----------
      const rev = (i) => ({
        animationDelay: `${i * 0.08}s`,
      });

      // ---------- Data ----------
      const PROJECTS = [
        {
          name: "LockonAI",
          desc: "AI tutor for VCE Maths. Trained on 2,800+ VCAA questions — generates personalised practice targeting your exact weaknesses, using active recall and spaced repetition. Built solo in 30 days.",
          meta: "2,800+ questions · active recall · weakness targeting",
          status: "LIVE",
          href: "https://lockonai.app/",
        },
        {
          name: "LumePath",
          desc: "Safety-first pedestrian routing for Clayton. Routes by ambient light data, not speed. Built at hackathon.",
          status: "HACKATHON",
          href: "https://lumepath-gold.vercel.app/",
        },
        {
          name: "Focal",
          desc: "Chrome extension productivity tool. Focus timer, distraction logging, task management, and Google Calendar sync — built around Kolb's Reflection Cycle and iCanStudy principles. Weekly reflection, goal setting, and prioritisation baked in.",
          meta: "Kolb's reflection · iCanStudy principles · Google Calendar API",
          status: "LIVE",
          href: "https://focal-web-alpha.vercel.app/app",
        },
        {
          name: "Personal Brand Site",
          desc: "This site. Dark editorial portfolio — type-driven, single column, zero clutter.",
          status: "LIVE",
          href: "/studio",
        },
      ];

      const STACK = [
        ["Python", "language"],
        ["Java", "language"],
        ["JavaScript", "language"],
        ["React", "frontend"],
        ["Tailwind CSS", "frontend"],
        ["HTML / CSS", "frontend"],
        ["Supabase", "backend"],
        ["Git / GitHub", "tooling"],
        ["NumPy / Pandas", "data"],
        ["PyTorch", "ai/ml (learning)"],
        ["Vite", "tooling"],
        ["REST APIs", "backend"],
        ["Vercel", "deployment"],
      ];

      const STORY = [
        {
          age: 15,
          head: "THE KID WHO DIDN'T MAKE IT.",
          body: "First job at Hungry Jack's. Failed Melbourne High entrance. My sister got into three selective schools. I hid in games — Fortnite top 0.05%, Valorant Immortal 2 top 0.14%. I wasn't lazy. My obsession was pointed at the wrong target.",
        },
        {
          age: 16,
          head: "PROMOTED. THEN FAILED MY SACS.",
          body: "Became crew coach. Started failing Methods and Psychology. Chose to prove the 'bad student' story wrong. Atomic Habits. 6-day training split. Shifted from fixed to systems mindset.",
        },
        {
          age: 17,
          head: "REBUILT EVERYTHING.",
          body: "Invested in iCanStudy (Justin Sung). Rebuilt study from scratch during VCE. Result: 94.8 ATAR. Scaled 46 in the subject I failed.",
        },
        {
          age: 18,
          head: "STARTED THINKING LIKE A FOUNDER.",
          body: "Entered Monash accelerated masters. Tutored 50+ students. Watched the same broken feedback loop repeat. Invested $1K in Stage Academy. Started reading Hormozi.",
        },
        {
          age: 19,
          head: "SHIPPED THE FIX.",
          body: "Built LockonAI solo in 30 days. 320+ VCAA-style questions tested. Marks handwritten work in under 30 seconds. Live with real users.",
        },
      ];

      const NOW = [
        { left: "Converting LockonAI free users to paid", right: "ongoing", live: true },
        { left: "Building my personal brand on LinkedIn + TikTok", right: "ongoing", live: true },
        { left: "2nd year Software Engineering @ Monash", right: "2024 — 2026", live: false },
      ];

      // ---------- Components ----------
      function TopRow() {
        return (
          <div className="top-row reveal" style={rev(0)}>
            <div className="breadcrumb">evan.dev</div>
            <div className="icon-row">
              <a className="icon-link" href="https://github.com/laqq2" target="_blank" rel="noreferrer" aria-label="GitHub"><Icon.Github /></a>
              <a className="icon-link" href="mailto:evankonggg@gmail.com" aria-label="Email"><Icon.Mail /></a>
            </div>
          </div>
        );
      }

      function Hero() {
        return (
          <section className="hero" id="hero">
            <h1 className="hero-name reveal" style={rev(1)}>
              Evan<span className="em"> </span><span className="blink">_</span>
            </h1>
            <div className="hero-meta reveal" style={rev(2)}>
              Software engineer<span className="dot" />AI founder<span className="dot" />Melbourne
            </div>
            <p className="hero-blurb reveal" style={rev(3)}>
              I build <span className="accent">AI products</span> that solve problems I've lived
              personally. Currently: <span className="accent">LockonAI</span> — automated exam
              marking for VCE students.
            </p>
            <div className="pill-row reveal" style={rev(4)}>
              <a className="pill pill-primary" href="#building">VIEW WORK ↓</a>
              <a className="pill pill-ghost" href="#story">READ MY STORY →</a>
            </div>
          </section>
        );
      }

      function Building() {
        return (
          <section className="section reveal" id="building" style={rev(5)}>
            <div className="section-label">BUILDING<span style={{ color: "#2a2a2a", letterSpacing: 0 }}> // 03</span></div>
            {PROJECTS.map((p) => (
              <a
                key={p.name}
                className="row"
                href={p.href}
                target={p.href.startsWith("http") ? "_blank" : undefined}
                rel="noreferrer"
              >
                <div className="row-main">
                  <h3 className="row-title">
                    {p.name}
                    <span className="row-arrow"><Icon.Arrow /></span>
                  </h3>
                  <div className="row-desc">{p.desc}</div>
                  {p.meta && <div className="row-meta">{p.meta}</div>}
                </div>
                <div className="row-side">
                  <span className={"status " + (p.status === "LIVE" ? "status-live" : "status-hack")}>
                    {p.status}
                  </span>
                </div>
              </a>
            ))}
          </section>
        );
      }

      function Stack() {
        return (
          <section className="section reveal" id="stack" style={rev(6)}>
            <div className="section-label">STACK</div>
            <div className="stack-grid">
              {STACK.map(([name, tag]) => (
                <div className="skill" key={name}>
                  <span className="skill-name">{name}</span>
                  <span className="skill-tag">{tag}</span>
                </div>
              ))}
            </div>
            <div className="study-line">
              <span className="em">Currently studying:</span> Bachelor of Software Engineering (Honours)
              — Monash University · WAM 81.75 · Accelerated Masters Pathway
            </div>
          </section>
        );
      }

      function Story() {
        return (
          <section className="section reveal" id="story" style={rev(7)}>
            <div className="section-label">STORY</div>
            {STORY.map((s) => (
              <div className="story-row" key={s.age}>
                <div className="story-age">{s.age}</div>
                <div className="story-body">
                  <h4 className="story-head">{s.head}</h4>
                  <div className="story-text">{s.body}</div>
                </div>
              </div>
            ))}
          </section>
        );
      }

      function Now() {
        return (
          <section className="section reveal" id="now" style={rev(8)}>
            <div className="section-label">NOW</div>
            {NOW.map((n, i) => (
              <div className="now-row" key={i}>
                <div className="left">
                  <span className={"now-bullet " + (n.live ? "" : "idle")} />
                  {n.left}
                </div>
                <div className="right">{n.right}</div>
              </div>
            ))}
          </section>
        );
      }

      function Contact() {
        return (
          <section className="contact reveal" id="contact" style={rev(9)}>
            <div className="section-label" style={{ marginBottom: 36 }}>CONTACT</div>
            <h2 className="contact-h">Let's talk.</h2>
            <p className="contact-p">
              I'm always open to interesting problems, collabs, or conversations about
              building things. Reach out.
            </p>
            <div className="contact-links">
              <a className="contact-link" href="mailto:evankonggg@gmail.com">Email <Icon.Arrow /></a>
              <a className="contact-link" href="https://github.com/laqq2" target="_blank" rel="noreferrer">GitHub <Icon.Arrow /></a>
            </div>
            <div className="footer-bar">
              <div>© 2026 Evan. Built with React + Vite. <a href="/studio" style={{ color: "#444", textDecoration: "none" }}>motion version →</a></div>
              <div className="ping"><span className="ping-dot" /> AVAILABLE FOR WORK</div>
            </div>
          </section>
        );
      }

      function App() {
        useCursor();
        return (
          <div className="shell">
            <TopRow />
            <Hero />
            <Building />
            <Stack />
            <Story />
            <Now />
            <Contact />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
